<!----- HEADER ------------------------------------------->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <title>Olyway</title>
  <meta charset="UTF-8">
</head>
<body>

<link rel='stylesheet' type='text/css' href='home.css'>
<script src="version.js"></script>

<!----- ECRAN DEMARRAGE ----->
<div id='EcranDemarrage'>
  <img id='ImgLogo' alt='Logo' src="icon-192.png">
  <span id='TxtOliway'>Olyway</span>
</div>

<!----- ECRAN PRINCIPAL ----->
<div id='EcranPrincipal' style='display: none;'>
  <span class='classTitre'>Menu Principal</span>
  <button class='classBouton' onclick=''>Suivre Parcours</button>
  <div class='classEspace'></div>
  <button class='classBouton' onclick='AfficherEcranEnregistrement();'>Nouveau Parcours</button>
  <div class='classEspace'></div>
  <button class='classTexte' onclick=''>vide</button>
  <div class='classEspace'></div>
  <button class='classBouton' onclick='AfficherEcranInfos();'>Informations</button>
  <div class='classEspace'></div>
  <button class='classBouton' style='background-color: #0F0; color: #000;' id='EcranPrincipalVoix' onclick='EcranPrincipalVoixClick()'>Voix activée</button>
</div>

<!----- Ecran INFOS ----->
<div id='EcranInfos' style='display: none;'>
  <span class='classTitre'>Menu Informations</span>
  <div class='classTexte' id='TxtInfosVersion'></div>
  <div class='classEspace'></div>
  <span class='classTexte' id='TxtInfosAuteurs'></span>
  <div class='classEspace'></div>
  <span class='classTexte'>vide</span>
  <div class='classEspace'></div>
  <button class='classTexte'>vide</button>
  <div class='classEspace'></div>
  <button class='classBouton' onclick='AfficherEcranPrincipal();'>Retour</button>
</div>

<!----- Ecran DEMARRER ----->
<div id='EcranDemarrer' style='display: none;'>
  <span class='classTitre'>Menu Enregistrement</span>
  <button class='classBouton' onclick='ButEnregistrementDemarrerClick();'>Démarrer</button>
  <div class='classEspace'></div>
  <button class='classBouton' onclick='ButEnregistrementAnnulerClick();'>Annuler</button>
</div>

<!----- Ecran ENREGISTREMENT (Full screen) ----->
<div id='EcranEnregistrement' style='display: none;'>
  <button id='BoutonEnregistrement' onclick='ButtonEnregistrementStopClick();'></button>
</div>

<!----- Ecran PAUSE ----->
<div id='EcranPause' style='display: none;'>
  <span class='classTexteReleves' onclick='ButRelevesEnregistrementClick();' id='TxtReleves'></span>
  <button class='classBouton' onclick='ButEnregistrementArreter();'>Arrêter</button>
  <span id='TxtPauseInfos' style='height: 1%;'></span>
</div>

<script src="home.js"></script>
<script src="EcranPrincipal.js"></script>
<script src="EcranInfos.js"></script>
<script src="EcranEnregistrer.js"></script>
<script src="EcranParcours.js"></script>

</body>
</html>
