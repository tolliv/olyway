<!-------------------------------------------------------
 Programme Olyway
 --------------------------------------------------------->

<!----- HEADER ------------------------------------------->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <title>Olyway</title>
  <meta charset="UTF-8">
</head>
<body>

<!----- Références à mettre au début ----->
<link rel='stylesheet' type='text/css' href='home.css'>
<script src="version.js"></script>
<script src="home.js"></script>
<script src="geolocalisationOlyway.js"></script>


<!----- ECRAN DEMARRAGE ----->
<div id='EcranDemarrage'>
  <span class='classDemarrage'>
    <img id='ImgLogo' alt='' src='icon-192.png'>
    <span class='classTexte' id='TxtOlyway'></span>
  </span>
  <button class='classBouton' id='ButDemarrage' onclick='ButDemarrageClick();'>Démarrer</button>
</div>


<!----- Ecran REDEMARRAGE ----->
<div id='EcranNouvelleVersion' style='display: none;'>
  <button class='classRedemarrage' id='ButRedemarrage' onclick='ButRedemarrageClick();'>Redémarrer</button>
</div>
<link rel='stylesheet' type='text/css' href='EcranInfos.css'>
<script src="EcranInfos.js"></script>


<!----- ECRAN PRINCIPAL ----->
<div id='EcranPrincipal' style='display: none;'>
  <span class='classTitre'>Ecran Principal</span>
  <button class='classBouton' id='ButSuivreParcours' onclick='AfficherEcranSuivreParcours();'>Suivre</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButNouveauParcours' onclick='AfficherEcranNouveauParcours();'>Nouveau</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButGestion' onclick='AfficherEcranGestion();'>Gestion</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButReglages' onclick='AfficherEcranReglages();'>Réglages</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButInfos' onclick='AfficherEcranInfos();'>Infos</button>
</div>
<link rel='stylesheet' type='text/css' href='EcranPrincipal.css'>
<script src="EcranPrincipal.js"></script>


<!----- Ecran SUIVRE PARCOURS ----->
<div id='EcranSuivreParcours_Choix' style='display: none;'>
  <span class='classTitre'>Ecran Mode</span>
  <button class='classBouton' id='ButSuivreParcoursAuDepart' onclick='ButSuivreParcoursAuDepartClick();'>Aller au départ</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButSuivreParcoursAuPlusPres' onclick='ButSuivreParcoursAuPlusPresClick();'>Aller sur le parcours</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButSuivreParcoursAnnuler_Choix' onclick='AfficherEcranPrincipal();'>Annuler</button>
</div>

<div id='EcranSuivreParcours' style='display: none;'>
  <span class='classTitre' id='TitreSuivreParcours'></span>
  <div id='ConteneurBoussole' style="text-align: center; background: transparent; padding: 20px; display: block;">
    <svg id='BoussoleSVG' viewBox='0 0 100 100' width='300' height='300' style='visibility: hidden;'>
      <g id='GroupeHeures' fill='var(--SUBCOLOR)' font-size='20' font-weight='bold' text-anchor='middle'>
        <text id='h12' x="50" y="16"></text>
        <text id='h1' x="72" y="20"></text>
        <text id='h2' x="88" y="38"></text>
        <text id='h3' x="92" y="58"></text>
        <text id='h4' x="88" y="78"></text>
        <text id='h5' x="72" y="92"></text>
        <text id='h6' x="50" y="96"></text>
        <text id='h7' x="28" y="92"></text>
        <text id='h8' x="12" y="78"></text>
        <text id='h9' x="8"  y="58"></text>
        <text id='h10' x="10" y="38"></text>
        <text id='h11' x="25" y="20"></text>
      </g>

      <!-- La flèche longue occupant le diamètre -->
      <g id="FlecheBoussole" transform="rotate(0, 50, 50)">
        <!-- Dessin de la flèche : Pointe large en haut (vers 12h) et corps fin s'étendant jusqu'en bas (vers 6h) -->
        <path d="M50 22 L65 72 L50 65 L35 72 Z" fill="#FFF" />
      </g>
    </svg>
  </div>
  <span class='classTexte' style='height: 19dvh;' id='TxtAttentePrecisionSuivi'></span>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButSuivreParcoursAnnuler' onclick='ButSuivreParcoursAnnulerClick();'>Annuler</button>
</div>
<link rel='stylesheet' type='text/css' href='EcranSuivreParcours.css'>
<script src="EcranSuivreParcours.js"></script>


<!----- Ecran SUIVI (Ecran noir) ----->
<div id='EcranSuivi' style='display: none;'>
  <button id='BoutonSuivi' onclick='EcranSuiviClick();'></button>
</div>
<link rel='stylesheet' type='text/css' href='EcranSuivi.css'>
<script src="EcranSuivi.js"></script>


<!----- Ecran NOUVEAU PARCOURS ----->
<div id='EcranNouveauParcours' style='display: none;'>
  <span class='classTitre'>Ecran Nouveau</span>
  <span class='classTexte' id='TxtAttentePrecisionEnregistrement'></span>
  <button class='classBouton' id='ButNouveauParcoursDemarrer' onclick='ButNouveauParcoursDemarrerClick();' style='display: none;'>Démarrer</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButNouveauParcoursAnnuler' onclick='ButNouveauParcoursAnnulerClick();'>Annuler</button>
</div>
<link rel='stylesheet' type='text/css' href='EcranNouveauParcours.css'>
<script src="EcranNouveauParcours.js"></script>


<!----- Ecran ENREGISTREMENT (Ecran noir) ----->
<div id='EcranEnregistrement' style='display: none;'>
  <button id='BoutonEnregistrement' onclick='EcranEnregistrementClick();'></button>
</div>
<link rel='stylesheet' type='text/css' href='EcranEnregistrer.css'>
<script src="EcranEnregistrer.js"></script>


<!----- Ecran PAUSE ----->
<div id='EcranPause' style='display: none;'>
  <span class='classTexteReleves' onclick='ButRelevesEnregistrementClick();' id='TxtReleves'></span>
  <span id='TxtPauseInfos' style='height: 1dvh;'>&nbsp;</span>
  <button class='classBouton' id='ButEnregistrementArreter' onclick='ButEnregistrementArreter();'>Arrêter</button>
</div>


<!----- Ecran NOM ----->
<div id='EcranNom' style='display: none;'>
  <span class='classTitre'>Ecran Nom</span>
  <input class='classInput' id='TxtNomParcours'>
  <button class='classBouton' id='ButNomValider' onclick='ButNomValiderClick();'>Valider</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButNomAnnuler' onclick='ButNomAnnulerClick();'>Ne pas<br>enregistrer</button>
</div>
<link rel='stylesheet' type='text/css' href='EcranNom.css'>
<script src="EcranNom.js"></script>


<!----- Ecran GESTION ----->
<div id='EcranGestion' style='display: none;'>
  <span class='classTitre'>Ecran Gestion</span>
  <button class='classBouton' id='ButGestionExporter' onclick='ButGestionExporterClick();'>Exporter</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButGestionImporter' onclick='ButGestionImporterClick();'>Importer</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButGestionInfos' onclick='ButGestionInfosClick();'>Détails</button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButSelectionRetour' onclick='AfficherEcranPrincipal();'>Retour</button>
</div>
<link rel='stylesheet' type='text/css' href='EcranGestion.css'>
<script src="EcranGestion.js"></script>


<!----- Ecran SELECTION ----->
<div id='EcranSelection' style='display: none;'>
  <span class='classTitre'>Ecran Sélection</span>
  <button class='classSelectionListe' id='ListeElement0' onclick='Selection(0);'></button>
  <button class='classSelectionListe' id='ListeElement1' onclick='Selection(1);'></button>
  <button class='classSelectionListe' id='ListeElement2' onclick='Selection(2);'></button>
  <button class='classSelectionListe' id='ListeElement3' onclick='Selection(3);'></button>
  <button class='classSelectionListe' id='ListeElement4' onclick='Selection(4);'></button>
  <button class='classSelectionListe' id='ListeElement5' onclick='Selection(5);'></button>
  <div class="classLigneBoutons">
    <button class="classBoutonDemi" onclick="SelectionPagePrecedente();" aria-label="Page précédente">Préc.</button>
    <button class="classBoutonDemi" onclick="SelectionPageSuivante();"   aria-label="Page suivants">Suiv.</button>
  </div>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButGestionRetour' onclick='CallSelectionAnnuler();'>Annuler</button>
</div>
<link rel='stylesheet' type='text/css' href='EcranSelection.css'>
<script src="EcranSelection.js"></script>


<!----- Ecran DETAILS ----->
<div id='EcranParcoursInfos' style='display: none;'>
  <span class='classTitre'>Ecran Détails</span>
  <div id='TxtParcoursInfos'></div>
  <button class='classBouton' id='ButParcoursInfosRetour' onclick='AfficherEcranGestion();'>Retour</button>
</div>
<link rel='stylesheet' type='text/css' href='EcranParcoursInfos.css'>
<script src="EcranParcoursInfos.js"></script>


<!----- Ecran REGLAGES ----->
<div id='EcranReglages' style='display: none;'>
  <span class='classTitre'>Ecran Réglages</span>
  <button class='classReglageOn' id='ButVoixInterface' onclick='ButVoixInterfaceClick();'>Interface<br><span class='texte-active'>Activée</span></button>
  <div class='classEspace'></div>
  <button class='classReglageOn' id='ButVoixNavigation' onclick='ButVoixNavigationClick();'>Navigation<br><span class='texte-active'>Activée</span></button>
  <div class='classEspace'></div>
  <button class='classReglageOn' id='ButCouleur' onclick='ButCouleurClick();'>Couleur<br><span class='texte-active'>Jaune</span></button>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButReglagesRetour' onclick='AfficherEcranPrincipal();'>Retour</button>
</div>
<link rel='stylesheet' type='text/css' href='EcranReglages.css'>
<script src="EcranReglages.js"></script>


<!----- Ecran INFOS ----->
<div id='EcranInfos' style='display: none;'>
  <span class='classTitre'>Ecran Infos</span>
  <div id='TxtInfos'></div>
  <button class='classBouton' id='ButInfosRetour' onclick='AfficherEcranPrincipal();'>Retour</button>
</div>
<link rel='stylesheet' type='text/css' href='EcranInfos.css'>
<script src="EcranInfos.js"></script>



</body>
</html>
