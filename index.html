</div>

<div id='EcranPrincipal' style='display: none;'>

  <div class='classEspace'></div>

</div>

<!----- Ecran PARCOURS ----->
<div id='EcranParcours' style='display: none;'>

  <button class='classBouton' id='ButParcoursNom' onclick='ButParcoursNomClick()'></button>
  <div class='classEspace'></div>
  <button class='classBouton' onclick='AfficherEcranSuivre()'>SUIVRE</button>
  <div class='classEspace'></div>
  <button class='classBouton' onclick='AfficherEcranCreer()'>CRÉER</button>
  <div class='classEspace'></div>
  <button class='classBouton' onclick='AfficherEcranPrincipal();'>RETOUR</button>
</div>

<!----- Ecran TRACES ----->
<div id='EcranTraces' style='display: none;'>
  <span class='classTitre'>Écran Traces</span>
  <input class='classInput' id='ClassInput' oninput='InputChange(this.value);' type='text'>
  <div class='classEspace'></div>
  <button class='classBouton' id='ButTraceBouton' onclick=''>(vide)</button>
  <div class='classEspace'></div>
  <span class='classTexte' id='ButTraceSpan'>(vide)</span>
  <div class='classEspace'></div>
  <button class='classBouton' onclick='AfficherEcranPrincipal();'>RETOUR</button>
</div>

<div id='EcranInfos' style='display: none;'>

  <div class='classEspace'></div>

  <button class='classBouton' onclick='ButtonEnregistrerDemarrerClick();'>DÉMARRER</button>

</div>
